# GameAssistant Production Docker Compose
# Usage:
#   1. cp docker-compose.yml docker-compose.prod.yml
#   2. Adjust environment variables below
#   3. docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ga_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gameassistant}
      MYSQL_USER: ${MYSQL_USER:-gameassistant}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-auth-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ga_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: ga_backend
    restart: always
    environment:
      APP_NAME: ${APP_NAME:-GameAssistant API}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: "false"
      DB_URL: mysql+aiomysql://${MYSQL_USER:-gameassistant}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-gameassistant}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      UPLOAD_DIR: /app/uploads
      TEMPLATE_DIR: /app/templates
      MODEL_DIR: /app/models
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
      - templates_data:/app/templates
      - models_data:/app/models
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ga_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: ga_nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro   # SSL certificates
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    networks:
      - ga_network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  templates_data:
    driver: local
  models_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  ga_network:
    driver: bridge
