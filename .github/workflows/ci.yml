name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.10'

jobs:
  # ── Frontend ────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: GameAssistant/web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: GameAssistant/web/frontend

      - name: Type check
        run: npm run type-check
        working-directory: GameAssistant/web/frontend

      - name: Lint
        run: npm run lint
        working-directory: GameAssistant/web/frontend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: GameAssistant/web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: GameAssistant/web/frontend

      - name: Build
        run: npm run build
        working-directory: GameAssistant/web/frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: GameAssistant/web/frontend/dist
          retention-days: 7

  # ── Backend ────────────────────────────────────────────────
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: GameAssistant/web/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -q
        working-directory: GameAssistant/web/backend

      - name: Python syntax check
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/api/v1/images.py
          python -m py_compile app/api/v1/models.py
          python -m py_compile app/api/v1/training.py
          python -m py_compile app/api/v1/inference.py
          python -m py_compile app/api/v1/datasets.py
        working-directory: GameAssistant/web/backend

  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./GameAssistant/web/backend
          push: false
          load: true
          tags: gameassistant/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── E2E Tests ───────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-build]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: GameAssistant/web/frontend

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3000
          E2E_USER: admin
          E2E_PASS: admin123
        run: npm test
        working-directory: GameAssistant/web/frontend

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: GameAssistant/web/frontend/playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: GameAssistant/web/frontend/test-results/
          retention-days: 14

  # ── Docker Image Publish ─────────────────────────────────────
  docker-publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./GameAssistant/web/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gameassistant-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gameassistant-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./GameAssistant/web/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gameassistant-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gameassistant-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
